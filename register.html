<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrieren - Kässeli</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="auth-page">

    <div class="auth-card">
      <div class="auth-logo-container">
        <div class="auth-logo">
          <span>🐷</span>
        </div>
      </div>

      <h1 class="auth-title">Kässeli</h1>
      <p class="auth-subtitle">Dein digitaler Sparmanager</p>

      <div class="auth-tabs">
        <a href="login.html" class="tab-btn inactive">
          <span class="icon">➔</span> Login
        </a>
        <a href="register.html" class="tab-btn active">
          <span class="icon">👤</span> Registrieren
        </a>
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label for="first_name">Vorname</label>
          <input type="text" id="first_name" placeholder="Max" required />
        </div>

        <div class="form-group">
          <label for="email">E-Mail</label>
          <input type="email" id="email" placeholder="max@beispiel.de" required />
        </div>
        
        <div class="form-group">
          <label for="password">Passwort</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        
        <button type="submit" class="btn-primary">Registrieren</button>
      </form>
    </div>

    <div class="help-badge">?</div>

    <script src="js/register.js"></script>
  </body>
</html>
